project:
  execute-dir: project

format:
  docx:
    crossref:
      ref-hyperlink: false
    keep-md: true
    notes-after-punctuation: true
    reference-doc: Brain_template_2022.docx
    csl: american-medical-association.csl
    toc: false
    echo: false
    # fig-format: svg # seems to break things
    fig-dpi: 600
    # dpi: 300
    toc-depth: 4
    cap-location: top
    fig-cap-location: top
    appendix-title: "Sup."
    tbl-cap-location: top
    number-sections: false
    number-depth: 3
    link-citations: true
    # date: last-modified
    # date-format: "[Last modified:] YYYY-MM-DD: H:mm:ss (A)"
    embed-resources: false
    appendix-style: plain
    mainfont: serif
  pdf:
    documentclass: scrartcl
  html:
    lightbox: auto
    toc: true
    notes-after-punctuation: true
    csl: brain.csl
    # fig-format: svg
    toc-float: true
    toc-depth: 4
    embed-resources: true
    appendix-style: plain
    mainfont: serif
    theme:
       light:
         - cosmo
         - inst/analyses/custom.scss
       dark:
         - darkly
         - inst/analyses/custom.scss
    css: inst/analyses/custom.scss
    number-sections: true
    number-depth: 3
    html-math-method: mathjax
    cap-location: top
    fig-cap-location: top
    tbl-cap-location: top
    code-fold: true
    echo: false
    date: last-modified
    date-format: "[Last modified:] YYYY-MM-DD: H:mm:ss (A)"
bibliography: inst/analyses/references.bib
reference-section-title: References
citeproc: false
knitr:
  opts_chunk:
    collapse: true
    comment: "#>"
    R.options:
      dev: svg
execute:
  warning: false
  message: false
  cache: true
  freeze: auto  # re-render only when source changes
filters:
  - quarto
  - section-bibliographies
  - highlight-text
  - authors-block
  - at: post-quarto
    path: inst/analyses/appendix_numbering.lua

crossref:
  subref-labels: alpha A
  appendix-title: "Supplementary material" # doesn't seem to work
  custom:
    - kind: float
      key: suppfig
      reference-prefix: Supplementary Fig.
      space-before-numbering: true
    - kind: float
      key: supptbl
      reference-prefix: Supplementary Table
      space-before-numbering: true
